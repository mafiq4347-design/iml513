<!DOCTYPE html>
<html lang="ms" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage: Interactive Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased text-slate-800 min-h-screen flex flex-col justify-between">

    <div class="w-full">
        <nav class="sticky top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm">
            <div class="max-w-6xl mx-auto flex justify-between items-center p-4 sm:px-6">
                <a href="index.html" class="text-blue-500 text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-droplet text-2xl"></i>
                    <span class="tracking-wide">Water Cycle Learn</span>
                </a>
                <div class="flex items-center gap-6 font-medium text-sm text-slate-600">
                    <a href="index.html" class="hover:text-blue-500 transition-colors"><i class="fa-solid fa-house mr-1"></i> Home</a>
                    <a href="quiz.html" class="text-blue-500 transition-colors"><i class="fa-solid fa-pen-clip mr-1"></i> Quiz</a>
                </div>
            </div>
        </nav>

        <main class="max-w-3xl mx-auto px-6 py-10 md:py-16 w-full">
            <div id="quiz-box" class="bg-white rounded-3xl p-6 md:p-10 shadow-xl border border-slate-100 text-center relative overflow-hidden transition-all duration-300">
                
                <div id="quiz-animation-container"></div>

                <div id="quiz-content" class="relative z-10">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                        <span id="timer" class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-xs font-bold tracking-wide flex items-center gap-1.5">
                            </span>
                    </div>

                    <h2 id="question" class="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-relaxed">
                        Memuatkan soalan...
                    </h2>

                    <div id="options" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                        </div>

                    <div class="flex justify-between items-center pt-4 border-t border-slate-100 text-sm font-bold text-slate-600">
                        <div id="score" class="flex items-center gap-1.5 text-blue-600">
                            <i class="fa-solid fa-trophy"></i> Skor: 0
                        </div>
                        <a href="index.html" class="text-xs text-slate-400 hover:text-red-500 transition font-medium">
                            <i class="fa-solid fa-xmark"></i> Berhenti Kuiz
                        </a>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <footer class="bg-slate-800 text-white/50 text-xs py-6 text-center border-t border-slate-700 w-full">
        <div class="max-w-6xl mx-auto px-6">
            <p>&copy; 2026 Water Cycle Learning Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
